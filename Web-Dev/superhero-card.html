<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: rgb(241, 241, 207);
        }
        .card{
            background-color: rgb(240, 137, 137);
        }
        .heading{
            text-decoration: underline;
            text-transform: capitalize;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            font-size: 40px;
            text-shadow: 3px 3px grey;
        }
        .sub-heading{
            text-decoration: underline;
            font-weight: bold;
            color: blue;
            
        }
        .properties{
            font-size: medium;
            color: rgb(154, 243, 154);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 class="heading">Thunder Kid</h1>
        <p>This is the most powerful hero in school</p>
        <h2 class="sub-heading">Super Powers</h2>
        <p class="properties">He can run faster than cheetah</p>
        <p class="properties">He can lift heavy objects</p>
        <h2 class="sub-heading">Weakness</h2>
        <p class="properties">He is afraid of water</p>
        <p class="properties">He is weak in maths</p>
   </div>
</body>
</html>
