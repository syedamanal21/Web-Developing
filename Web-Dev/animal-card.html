<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Card</title>
    <style>
        body{
            background-color: rgb(140, 232, 232);
        }
        .animal-box{
            width: 290px;
            border: 2px solid black;
            margin: 60px;
            padding: 30px;
            background-color: rgb(87, 209, 203);
            border-radius: 10px;
        }
        .animal-title{
            font-size: 30px;
            color: forestgreen;
            text-decoration: underline;
        }
        .details{
            color:rgb(10, 133, 210)
        }
        .fun-fact{
            color: black;
            font-style: italic;
        }

    </style>
</head>
<body>
    <div class="animal-box">
        <h2 class="animal-title">Snow leopard</h2>
        <p class="details"> Type : Big Cat </p>
        <p class="details"> Food : Deers,Sheeps and Goats </p>
        <p class="details"> Lives in : In mountains of south asia </p>
        <p class="details"> Speed : They can reach top speeds of 40 mph (60 km/h) </p>
        <p class="Fun-Fact"> Cool Fact : In a single jump , it can cover a leap of 15 </p>

    </div>
</body>
</html>
