<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <title>My Hobby Hub</title>
    <style>
        body{
            background-color: rgb(255, 255, 255);
        }
    </style>
</head>
<body>
    <!-- container-fluid: streches to fill the full width of the screen -->
     <div class="container-fluid bg-primary text0white p-4">
        <h1>My Hobby Hub</h1>
        <p>A page about things i love to do</p>
     </div>

     <!--container: keep contents centred and neat on the page-->
     <div class="bg-success text-white p-3 my-3">
        <h2>reading</h2>
        <p>i love reading fictional books</p>
     </div>

     <!-- bg-warning yellow background with a dark border-->
      <div class="bg-warning border border-dark p-3 my-3">
      <h2>Drawing</h2>
      <p>i love to draw and sketch</p>
      </div>

      <!-- bg-info: that background with a dark border -->
       <div class="bg-info text-white border border-dark p-3 my-3">
        <h2>Sports </h2>
        <p>I love to play cricket</p>
       </div>

       <!-- bg-light: light background with a visible dark border-->
        <div class="bg-light border border-dark p-3 my-3"> 
            <h2>Music</h2>
            <p>I love to listen music</p>
        </div>
          
        <!--container-fluid footer: full-width dark bar at the bottom-->
        <div class="contaoner-fluid bg-dark text-white p-3">
            <p>Made with Bootstrap - My hobby hub</p>
        </div>

</body>
</html>
