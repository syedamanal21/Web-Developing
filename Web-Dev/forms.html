<body>
    <h1>Personal Details Forms</h1>
    <form>
        <label>Name</label><br>
        <input type="text" id="name"><br><br>
        <label>Email ID</label><br>
        <input type="text" id="email"><br><br>
        <label>Contact Number (This will be hidden)</label><br>
        <input type="password" id="contact"><br><br>
        <label>Gender</label><br>
        <input type="radio" id="female" name="gender" value="female">female<br>
        <input type="radio" id="male" name="gender" value="male">male<br><br>
        <label>Favourit City</label><br>
        <input type="checkbox" id="city value=Karachi">Karachi<br>
        <input type="checkbox" id="city value=Islamabad">Islamabad<br><br>
        <input type="submit">
    </form>
