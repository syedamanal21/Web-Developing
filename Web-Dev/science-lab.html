<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Science Lab</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
</head>
<body>
   <!-- jumbotron: full-width highlighted banner -->
<div class="jumbotron jumbotron-fluid">
  <div class="container">
    <h1>My Science Lab</h1>
    <p class="lead">Welcome to the lab!</p>
  </div>
</div>
<!-- Four Bootstrap buttons — one for each subject -->
<button class="btn btn-primary">Chemistry</button>
<button class="btn btn-success">Biology</button>
<button class="btn btn-warning">Physics</button>
<button class="btn btn-danger">Astronomy</button>
<!-- Badge attached to a subject name -->
<p>
  Chemistry
  <span class="badge badge-primary">7 experiments</span>
</p>

<!-- Badge on a heading showing total count -->
<h2>Experiments Completed <span class="badge badge-danger">4</span></h2>
<!-- Progress bar: outer container + inner fill -->
<div class="progress mb-3">
  <div class="progress-bar bg-primary" style="width: 85%">85%</div>
</div>

<div class="progress mb-3">
  <div class="progress-bar bg-success" style="width: 70%">70%</div>
</div>

</body>
</html>
