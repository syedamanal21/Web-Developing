<html>
<body>
    <script>

        // Display current date
        var currentDate = new Date();
        document.write("Today's Date: " + currentDate + "<br><br>");

        // Generate random numbers
        document.write("Generated Numbers:<br>");
        for (var i = 1; i <= 7; i++) {
            var number = Math.random() * 50;
            document.write(number + "<br>");
        }

        document.write("<br>");

        // Rounded random number
        var luckyNumber = Math.floor(Math.random() * 200);
        document.write("Lucky Number: " + luckyNumber);

    </script>
</body>
</html>
